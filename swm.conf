# swm.conf — Simple Window Manager configuration
#
# Lines starting with '#' are comments.
# Blank lines are ignored.
#
# ── General ──────────────────────────────────────────────────────────────
#
# terminal   default program launched by the "spawn" action with no arg
# mod        modifier key: mod4 (Super/Win), mod1 (Alt), ctrl, shift
# border_width  border thickness in pixels
# border_color  unfocused window border (hex or named X11 colour)
# focus_color   focused  window border (hex or named X11 colour)
# move_step     pixels to move a window per keyboard step
# resize_step   pixels to resize a window per keyboard step

terminal      = xterm
mod           = mod4
border_width  = 2
border_color  = #3a3a3a
focus_color   = #7a9fcf
move_step     = 32
resize_step   = 32


# ── Key bindings ─────────────────────────────────────────────────────────
#
# Format:
#   key <modifier> <XKeysym>  <action>  [argument]
#
# Modifiers can be chained without spaces: mod4shift, mod4ctrl, etc.
# XKeysym names: Return, q, j, k, f, h, l, equal, minus, Left, Right …
# Run "xev" to find the exact name of any key.
#
# Available actions:
#   spawn        fork+exec the argument (or terminal if no arg)
#   kill         close / destroy the focused window
#   focus_next   move focus to the next window in the list
#   focus_prev   move focus to the previous window in the list
#   fullscreen   toggle fullscreen on the focused window
#   move         move focused window; arg = "dx dy" in pixels
#   resize       resize focused window; arg = "dw dh" in pixels
#   quit         exit swm cleanly
#
# ── Spawning ──────────────────────────────────────────────────────────────

# Open a new terminal
key mod4          Return   spawn

# Open a dmenu launcher (requires dmenu to be installed)
key mod4          d        spawn  dmenu_run

# ── Window management ────────────────────────────────────────────────────

# Kill focused window
key mod4          q        kill

# Toggle fullscreen
key mod4          f        fullscreen

# ── Focus ────────────────────────────────────────────────────────────────

# Cycle focus forward / backward through managed windows
key mod4          j        focus_next
key mod4          k        focus_prev

# ── Keyboard move (mod + arrow keys) ────────────────────────────────────

key mod4          Left     move   -32 0
key mod4          Right    move    32 0
key mod4          Up       move    0 -32
key mod4          Down     move    0  32

# ── Keyboard resize (mod + shift + arrow keys) ──────────────────────────

key mod4shift     Left     resize  -32 0
key mod4shift     Right    resize   32 0
key mod4shift     Up       resize   0 -32
key mod4shift     Down     resize   0  32

# ── Toggle tiling mode (mod + shift + arrow keys) ──────────────────────────

key mod4shift     t        tile_toggle

# ── Media keys ───────────────────────────────────────────────────────────

key none          XF86AudioRaiseVolume   spawn  pactl set-sink-volume @DEFAULT_SINK@ +5%
key none          XF86AudioLowerVolume   spawn  pactl set-sink-volume @DEFAULT_SINK@ -5%
key none          XF86AudioMute          spawn  pactl set-sink-mute @DEFAULT_SINK@ toggle

# ── Quit ─────────────────────────────────────────────────────────────────

key mod4shift     q        quit


# ── Mouse bindings (built-in, not configurable here) ─────────────────────
#
# mod + left-click  + drag   → move window
# mod + right-click + drag   → resize window
